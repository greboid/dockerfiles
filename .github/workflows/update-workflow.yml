on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '**/Containerfile'
name: Update Workflow
jobs:
  update-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@master
        with:
          token: ${{ secrets.CONTEMPT_TOKEN }}
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - name: Cache orchestrator
        uses: actions/cache@v5
        id: cache
        with:
          path: ~/go/bin/orchestrator
          key: orchestrator-${{ runner.os }}-${{ runner.arch }}-splitupdating
      - name: Clone and build orchestrator
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone -b splitupdating https://github.com/greboid/contempt.git /tmp/contempt
          cd /tmp/contempt
          go build -o ~/go/bin/orchestrator ./cmd/orchestrator
      - name: Run contempt orchestrator
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          TEMPLATE: .github/workflows/update-containers.yml.gotpl
          OUTPUT: .github/workflows/update-containers.yml
        run: orchestrator .
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
            commit_message: "Update container workflow"
            commit_user_name: ${{ secrets.GIT_USERNAME }}
            commit_user_email: ${{ secrets.GIT_EMAIL }}
            file_pattern: '.github/workflows/update-containers.yml'
      - name: Push changes
        uses: cutlerydrawer/action-git-try-push@v2
