name: Reproducibility Test

on:
  workflow_dispatch:

jobs:
  reproducibility-test:
    name: Reproducibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@master

      - name: Install buildah from source
        run: |
          sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
          cd /tmp/buildah
          make bin/buildah
          sudo install -m 755 bin/buildah /usr/bin/buildah
          buildah --version

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"

      - name: Build golang image twice and compare
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          echo "=== Build 1 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --tag dir:$DIR/build1 \
            golang/ 2>&1 | tail -5

          echo "=== Build 2 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --tag dir:$DIR/build2 \
            golang/ 2>&1 | tail -5

          echo ""
          echo "=== Full manifest diff ==="
          diff <(cat $DIR/build1/manifest.json | python3 -m json.tool) <(cat $DIR/build2/manifest.json | python3 -m json.tool) || true

          echo ""
          echo "=== Config comparison ==="
          CFG1=$(python3 -c "import json; print(json.load(open('$DIR/build1/manifest.json'))['config']['digest'].split(':')[1])")
          CFG2=$(python3 -c "import json; print(json.load(open('$DIR/build2/manifest.json'))['config']['digest'].split(':')[1])")
          echo "Config 1: $CFG1"
          echo "Config 2: $CFG2"
          diff <(cat $DIR/build1/$CFG1 | python3 -m json.tool) <(cat $DIR/build2/$CFG2 | python3 -m json.tool) || true

          echo ""
          echo "=== Layer comparison ==="
          python3 -c "
          import json
          m1 = json.load(open('$DIR/build1/manifest.json'))
          m2 = json.load(open('$DIR/build2/manifest.json'))
          l1 = [l['digest'] for l in m1['layers']]
          l2 = [l['digest'] for l in m2['layers']]
          print('Build 1 layers:')
          for l in l1: print('  ' + l)
          print('Build 2 layers:')
          for l in l2: print('  ' + l)
          if l1 == l2:
              print('All layers identical')
          else:
              print('Layers differ')
          "

          echo ""
          echo "=== Summary ==="
          python3 -c "
          import json, sys
          m1 = json.load(open('$DIR/build1/manifest.json'))
          m2 = json.load(open('$DIR/build2/manifest.json'))
          layers_match = [l['digest'] for l in m1['layers']] == [l['digest'] for l in m2['layers']]
          config_match = m1['config']['digest'] == m2['config']['digest']
          annotations_match = m1.get('annotations') == m2.get('annotations')
          if layers_match and config_match:
              print('IMAGE IS REPRODUCIBLE (layers+config match)')
              if not annotations_match:
                  print('Annotations differ:')
                  for k in sorted(set(list(m1.get('annotations',{}).keys()) + list(m2.get('annotations',{}).keys()))):
                      v1 = m1.get('annotations',{}).get(k, '<missing>')
                      v2 = m2.get('annotations',{}).get(k, '<missing>')
                      if v1 != v2:
                          print(f'  {k}:')
                          print(f'    build1: {v1}')
                          print(f'    build2: {v2}')
              sys.exit(0)
          else:
              print('IMAGE IS NOT REPRODUCIBLE')
              sys.exit(1)
          "

      - name: Verify fix - build with unsetannotation
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          echo "=== Build 1 with --unsetannotation ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --unsetannotation org.opencontainers.image.base.digest \
            --tag dir:$DIR/build1 \
            golang/ 2>&1 | tail -5

          echo "=== Build 2 with --unsetannotation ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --unsetannotation org.opencontainers.image.base.digest \
            --tag dir:$DIR/build2 \
            golang/ 2>&1 | tail -5

          echo ""
          echo "=== Full manifest diff ==="
          diff <(cat $DIR/build1/manifest.json | python3 -m json.tool) <(cat $DIR/build2/manifest.json | python3 -m json.tool) && echo "Manifests identical" || echo "Manifests differ"

          echo ""
          echo "=== Check annotations in build1 ==="
          python3 -c "
          import json
          m = json.load(open('$DIR/build1/manifest.json'))
          print('Annotations:', json.dumps(m.get('annotations',{}), indent=2))
          "
