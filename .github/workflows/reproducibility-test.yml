name: Reproducibility Test

on:
  workflow_dispatch:

jobs:
  reproducibility-test:
    name: Reproducibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@master

      - name: Install buildah from source
        run: |
          sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
          cd /tmp/buildah
          make bin/buildah
          sudo install -m 755 bin/buildah /usr/bin/buildah
          buildah --version

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"

      - name: Build alpine twice and compare
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          echo "=== Alpine Build 1 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --unsetannotation org.opencontainers.image.base.digest \
            --tag dir:$DIR/alpine1 \
            alpine/ 2>&1 | tail -5

          echo "=== Alpine Build 2 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --unsetannotation org.opencontainers.image.base.digest \
            --tag dir:$DIR/alpine2 \
            alpine/ 2>&1 | tail -5

          echo ""
          echo "=== Alpine manifest diff ==="
          diff <(cat $DIR/alpine1/manifest.json | python3 -m json.tool) <(cat $DIR/alpine2/manifest.json | python3 -m json.tool) && echo "Alpine manifests identical" || echo "Alpine manifests differ"

          echo ""
          echo "=== Alpine config diff ==="
          CFG1=$(python3 -c "import json; print(json.load(open('$DIR/alpine1/manifest.json'))['config']['digest'].split(':')[1])")
          CFG2=$(python3 -c "import json; print(json.load(open('$DIR/alpine2/manifest.json'))['config']['digest'].split(':')[1])")
          echo "Config 1: $CFG1"
          echo "Config 2: $CFG2"
          diff <(cat $DIR/alpine1/$CFG1 | python3 -m json.tool) <(cat $DIR/alpine2/$CFG2 | python3 -m json.tool) && echo "Alpine configs identical" || echo "Alpine configs differ"

          echo ""
          echo "=== Alpine layer diff ==="
          python3 -c "
          import json
          m1 = json.load(open('$DIR/alpine1/manifest.json'))
          m2 = json.load(open('$DIR/alpine2/manifest.json'))
          l1 = [l['digest'] for l in m1['layers']]
          l2 = [l['digest'] for l in m2['layers']]
          print('Alpine 1 layers:', l1)
          print('Alpine 2 layers:', l2)
          if l1 == l2: print('Identical')
          else: print('Differ')
          "

      - name: Build golang twice and compare
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          echo "=== Golang Build 1 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --unsetannotation org.opencontainers.image.base.digest \
            --tag dir:$DIR/golang1 \
            golang/ 2>&1 | tail -5

          echo "=== Golang Build 2 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --unsetannotation org.opencontainers.image.base.digest \
            --tag dir:$DIR/golang2 \
            golang/ 2>&1 | tail -5

          echo ""
          echo "=== Golang manifest diff ==="
          diff <(cat $DIR/golang1/manifest.json | python3 -m json.tool) <(cat $DIR/golang2/manifest.json | python3 -m json.tool) && echo "Golang manifests identical" || echo "Golang manifests differ"

          echo ""
          echo "=== Golang config diff ==="
          CFG1=$(python3 -c "import json; print(json.load(open('$DIR/golang1/manifest.json'))['config']['digest'].split(':')[1])")
          CFG2=$(python3 -c "import json; print(json.load(open('$DIR/golang2/manifest.json'))['config']['digest'].split(':')[1])")
          echo "Config 1: $CFG1"
          echo "Config 2: $CFG2"
          diff <(cat $DIR/golang1/$CFG1 | python3 -m json.tool) <(cat $DIR/golang2/$CFG2 | python3 -m json.tool) && echo "Golang configs identical" || echo "Golang configs differ"

          echo ""
          echo "=== Golang layer diff ==="
          python3 -c "
          import json
          m1 = json.load(open('$DIR/golang1/manifest.json'))
          m2 = json.load(open('$DIR/golang2/manifest.json'))
          l1 = [l['digest'] for l in m1['layers']]
          l2 = [l['digest'] for l in m2['layers']]
          print('Golang 1 layers:', l1)
          print('Golang 2 layers:', l2)
          if l1 == l2: print('Identical')
          else: print('Differ')
          "
