name: Reproducibility Test

on:
  workflow_dispatch:

jobs:
  reproducibility-test:
    name: Reproducibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@master

      - name: Install buildah from source
        run: |
          sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
          cd /tmp/buildah
          make bin/buildah
          sudo install -m 755 bin/buildah /usr/bin/buildah
          buildah --version

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"

      - name: Investigate base image
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          ALPINE_REF=$(grep '^FROM' golang/Containerfile | head -1 | awk '{print $2}')
          echo "Base image reference: $ALPINE_REF"

          echo ""
          echo "=== Pull and inspect round 1 ==="
          buildah pull $ALPINE_REF 2>&1
          INSPECT1=$(buildah inspect --type image $ALPINE_REF)
          FROMDIGEST1=$(echo "$INSPECT1" | python3 -c "import json,sys; print(json.load(sys.stdin)['FromImageDigest'])")
          FROMID1=$(echo "$INSPECT1" | python3 -c "import json,sys; print(json.load(sys.stdin)['FromImageID'])")
          FROMNAME1=$(echo "$INSPECT1" | python3 -c "import json,sys; print(json.load(sys.stdin)['FromImage'])")
          echo "  FromImage:        $FROMNAME1"
          echo "  FromImageID:      $FROMID1"
          echo "  FromImageDigest:  $FROMDIGEST1"

          echo ""
          echo "=== Remove local image ==="
          buildah rmi $ALPINE_REF 2>/dev/null || true

          echo ""
          echo "=== Pull and inspect round 2 ==="
          buildah pull $ALPINE_REF 2>&1
          INSPECT2=$(buildah inspect --type image $ALPINE_REF)
          FROMDIGEST2=$(echo "$INSPECT2" | python3 -c "import json,sys; print(json.load(sys.stdin)['FromImageDigest'])")
          FROMID2=$(echo "$INSPECT2" | python3 -c "import json,sys; print(json.load(sys.stdin)['FromImageID'])")
          FROMNAME2=$(echo "$INSPECT2" | python3 -c "import json,sys; print(json.load(sys.stdin)['FromImage'])")
          echo "  FromImage:        $FROMNAME2"
          echo "  FromImageID:      $FROMID2"
          echo "  FromImageDigest:  $FROMDIGEST2"

          echo ""
          echo "=== Comparison ==="
          echo "  FromImageDigest match: $([ "$FROMDIGEST1" = "$FROMDIGEST2" ] && echo YES || echo NO)"
          echo "  FromImageID match:     $([ "$FROMID1" = "$FROMID2" ] && echo YES || echo NO)"

          if [ "$FROMDIGEST1" != "$FROMDIGEST2" ]; then
            echo ""
            echo "=== Full inspect diff ==="
            diff <(echo "$INSPECT1" | python3 -m json.tool) <(echo "$INSPECT2" | python3 -m json.tool) || true
          fi

      - name: Build golang image twice
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          echo "=== Build 1 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --tag dir:$DIR/build1 \
            golang/

          echo "=== Build 2 ==="
          buildah bud \
            --source-date-epoch 0 \
            --rewrite-timestamp \
            --omit-history \
            --layers=true \
            --squash \
            --tag dir:$DIR/build2 \
            golang/

          echo ""
          echo "=== Config comparison ==="
          CFG1=$(python3 -c "import json; print(json.load(open('$DIR/build1/manifest.json'))['config']['digest'].split(':')[1])")
          CFG2=$(python3 -c "import json; print(json.load(open('$DIR/build2/manifest.json'))['config']['digest'].split(':')[1])")
          echo "Config 1: $CFG1"
          echo "Config 2: $CFG2"
          diff <(cat $DIR/build1/$CFG1 | python3 -m json.tool) <(cat $DIR/build2/$CFG2 | python3 -m json.tool) && echo "Configs identical" || echo "Configs differ"

          echo ""
          echo "=== Layer comparison ==="
          python3 -c "
          import json
          m1 = json.load(open('$DIR/build1/manifest.json'))
          m2 = json.load(open('$DIR/build2/manifest.json'))
          l1 = [l['digest'] for l in m1['layers']]
          l2 = [l['digest'] for l in m2['layers']]
          print('Build 1 layers:')
          for l in l1: print('  ' + l)
          print('Build 2 layers:')
          for l in l2: print('  ' + l)
          if l1 == l2:
              print('All layers identical')
          else:
              print('Layers differ')
          "

          echo ""
          echo "=== Manifest diff ==="
          diff <(cat $DIR/build1/manifest.json | python3 -m json.tool) <(cat $DIR/build2/manifest.json | python3 -m json.tool) && echo "Manifests identical" || echo "Manifests differ"

          echo ""
          echo "=== Summary ==="
          python3 -c "
          import json, sys
          m1 = json.load(open('$DIR/build1/manifest.json'))
          m2 = json.load(open('$DIR/build2/manifest.json'))
          layers_match = [l['digest'] for l in m1['layers']] == [l['digest'] for l in m2['layers']]
          config_match = m1['config']['digest'] == m2['config']['digest']
          if layers_match and config_match:
              print('IMAGE IS REPRODUCIBLE (layers+config match)')
              if m1.get('annotations') != m2.get('annotations'):
                  print('Annotations differ:')
                  for k in sorted(set(list(m1.get('annotations',{}).keys()) + list(m2.get('annotations',{}).keys()))):
                      v1 = m1.get('annotations',{}).get(k, '<missing>')
                      v2 = m2.get('annotations',{}).get(k, '<missing>')
                      if v1 != v2:
                          print(f'  {k}:')
                          print(f'    build1: {v1}')
                          print(f'    build2: {v2}')
              sys.exit(0)
          else:
              print('IMAGE IS NOT REPRODUCIBLE')
              sys.exit(1)
          "
