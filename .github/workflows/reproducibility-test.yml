name: Reproducibility Test

on:
  workflow_dispatch:

jobs:
  reproducibility-test:
    name: Reproducibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@master

      - name: Install buildah from source
        run: |
          sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
          cd /tmp/buildah
          make bin/buildah
          sudo install -m 755 bin/buildah /usr/bin/buildah
          buildah --version

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"

      - name: Build golang three times and compare
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          for i in 1 2 3; do
            echo "=== Build $i ==="
            buildah bud \
              --source-date-epoch 0 \
              --rewrite-timestamp \
              --omit-history \
              --layers=true \
              --squash \
              --unsetannotation org.opencontainers.image.base.digest \
              --tag dir:$DIR/build$i \
              golang/ 2>&1 | tail -3
          done

          echo ""
          echo "=== Comparing all builds ==="
          for i in 1 2 3; do
            LAYER=$(python3 -c "import json; print(json.load(open('$DIR/build$i/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            CONFIG=$(python3 -c "import json; print(json.load(open('$DIR/build$i/manifest.json'))['config']['digest'].split(':')[1])")
            echo "Build $i: layer=$LAYER config=$CONFIG"
          done

          echo ""
          ALL_SAME=true
          REF_LAYER=$(python3 -c "import json; print(json.load(open('$DIR/build1/manifest.json'))['layers'][0]['digest'].split(':')[1])")
          for i in 2 3; do
            LAYER=$(python3 -c "import json; print(json.load(open('$DIR/build$i/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            if [ "$LAYER" != "$REF_LAYER" ]; then
              ALL_SAME=false
            fi
          done

          if $ALL_SAME; then
            echo "All layers identical - checking manifests"
            diff <(cat $DIR/build1/manifest.json | python3 -m json.tool) <(cat $DIR/build2/manifest.json | python3 -m json.tool) && echo "All manifests identical" || echo "Manifests differ"
          else
            echo "Layers differ between builds - doing deep analysis"
            
            mkdir -p $DIR/l1 $DIR/l2
            LAYER1=$(python3 -c "import json; print(json.load(open('$DIR/build1/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            LAYER2=$(python3 -c "import json; print(json.load(open('$DIR/build2/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            
            if file $DIR/build1/$LAYER1 | grep -q gzip; then
              zcat $DIR/build1/$LAYER1 | tar -C $DIR/l1 -xf -
              zcat $DIR/build2/$LAYER2 | tar -C $DIR/l2 -xf -
            else
              tar -C $DIR/l1 -xf $DIR/build1/$LAYER1
              tar -C $DIR/l2 -xf $DIR/build2/$LAYER2
            fi

            echo ""
            echo "=== File content diff ==="
            diff <(cd $DIR/l1 && find . -type f -exec sha256sum {} \; | sort) <(cd $DIR/l2 && find . -type f -exec sha256sum {} \; | sort) > $DIR/content-diff.txt 2>&1
            if [ -s $DIR/content-diff.txt ]; then
              DIFF_COUNT=$(comm -12 <(grep "^<" $DIR/content-diff.txt | awk '{print $NF}' | sort -u) <(grep "^>" $DIR/content-diff.txt | awk '{print $NF}' | sort -u) | wc -l)
              echo "$DIFF_COUNT files with different content:"
              comm -12 <(grep "^<" $DIR/content-diff.txt | awk '{print $NF}' | sort -u) <(grep "^>" $DIR/content-diff.txt | awk '{print $NF}' | sort -u) | head -20
            else
              echo "File content is identical - checking tar ordering"
            fi

            echo ""
            echo "=== Tar entry ordering diff ==="
            diff <(tar -tf $DIR/build1/$LAYER1) <(tar -tf $DIR/build2/$LAYER2) > $DIR/order-diff.txt 2>&1
            if [ -s $DIR/order-diff.txt ]; then
              echo "Tar ordering differs (first 50 lines):"
              head -50 $DIR/order-diff.txt
            else
              echo "Tar ordering is identical"
            fi

            echo ""
            echo "=== Tar metadata diff (sorted by path) ==="
            diff <(tar -tvf $DIR/build1/$LAYER1 | awk '{$1=$2=$3=""; print substr($0,4)}' | sort) <(tar -tvf $DIR/build2/$LAYER2 | awk '{$1=$2=$3=""; print substr($0,4)}' | sort) > $DIR/meta-diff.txt 2>&1
            if [ -s $DIR/meta-diff.txt ]; then
              echo "Tar metadata differs (first 50 lines):"
              head -50 $DIR/meta-diff.txt
            else
              echo "Tar metadata is identical"
            fi
          fi
