name: Reproducibility Test

on:
  workflow_dispatch:

jobs:
  reproducibility-test:
    name: Reproducibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@master

      - name: Install buildah from source
        run: |
          sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
          cd /tmp/buildah
          make bin/buildah
          sudo install -m 755 bin/buildah /usr/bin/buildah
          buildah --version

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"

      - name: Build golang three times and compare raw tar bytes
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          DIR=$(mktemp -d)
          echo "Working in $DIR"

          for i in 1 2 3; do
            echo "=== Build $i ==="
            buildah bud \
              --source-date-epoch 0 \
              --rewrite-timestamp \
              --omit-history \
              --layers=true \
              --squash \
              --unsetannotation org.opencontainers.image.base.digest \
              --tag dir:$DIR/build$i \
              golang/ 2>&1 | tail -3
          done

          echo ""
          echo "=== Digests ==="
          for i in 1 2 3; do
            LAYER=$(python3 -c "import json; print(json.load(open('$DIR/build$i/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            CONFIG=$(python3 -c "import json; print(json.load(open('$DIR/build$i/manifest.json'))['config']['digest'].split(':')[1])")
            SIZE=$(stat -c%s "$DIR/build$i/$LAYER" 2>/dev/null || echo N/A)
            echo "Build $i: layer=$LAYER config=$CONFIG layer_size=$SIZE"
          done

          LAYER1=$(python3 -c "import json; print(json.load(open('$DIR/build1/manifest.json'))['layers'][0]['digest'].split(':')[1])")
          LAYER2=$(python3 -c "import json; print(json.load(open('$DIR/build2/manifest.json'))['layers'][0]['digest'].split(':')[1])")
          LAYER3=$(python3 -c "import json; print(json.load(open('$DIR/build3/manifest.json'))['layers'][0]['digest'].split(':')[1])")

          if [ "$LAYER1" = "$LAYER2" ] && [ "$LAYER2" = "$LAYER3" ]; then
            echo ""
            echo "All layers identical"
            diff <(cat $DIR/build1/manifest.json | python3 -m json.tool) <(cat $DIR/build3/manifest.json | python3 -m json.tool) && echo "All manifests identical" || echo "Manifests differ"
            exit 0
          fi

          echo ""
          echo "=== Raw tar byte comparison ==="
          # Compare 1 vs the first different one
          if [ "$LAYER1" != "$LAYER3" ]; then
            REF=$LAYER1
            DIFF=$LAYER3
            REF_N=1
            DIFF_N=3
          else
            REF=$LAYER1
            DIFF=$LAYER2
            REF_N=1
            DIFF_N=2
          fi

          echo "Comparing build $REF_N ($REF) vs build $DIFF_N ($DIFF)"

          echo ""
          echo "=== File sizes ==="
          SIZE_REF=$(stat -c%s "$DIR/build1/$REF")
          SIZE_DIFF=$(stat -c%s "$DIR/build${DIFF_N}/$DIFF")
          echo "Build $REF_N: $SIZE_REF bytes"
          echo "Build $DIFF_N: $SIZE_DIFF bytes"
          echo "Difference: $((SIZE_REF - SIZE_DIFF)) bytes"

          echo ""
          echo "=== First byte difference ==="
          cmp -l "$DIR/build1/$REF" "$DIR/build${DIFF_N}/$DIFF" | head -20

          echo ""
          echo "=== Number of byte differences ==="
          DIFF_COUNT=$(cmp -l "$DIR/build1/$REF" "$DIR/build${DIFF_N}/$DIFF" | wc -l)
          echo "$DIFF_COUNT differing bytes"

          echo ""
          echo "=== Byte difference offsets and values ==="
          cmp -l "$DIR/build1/$REF" "$DIR/build${DIFF_N}/$DIFF" | awk '{printf "offset %d: build%d=0x%02x build%d=0x%02x\n", $1, '"$REF_N"', $2, '"$DIFF_N"', $3}' | head -30

          echo ""
          echo "=== Checking if it's PAX headers ==="
          # PAX headers appear as ./PaxHeaders.XXXXX/ filenames in tar
          mkdir -p $DIR/t1 $DIR/t3
          tar -tf "$DIR/build1/$REF" | grep -i pax | head -10 > $DIR/pax1.txt
          tar -tf "$DIR/build${DIFF_N}/$DIFF" | grep -i pax | head -10 > $DIR/pax3.txt
          echo "PAX entries in build $REF_N: $(wc -l < $DIR/pax1.txt)"
          echo "PAX entries in build $DIFF_N: $(wc -l < $DIR/pax3.txt)"
          diff $DIR/pax1.txt $DIR/pax3.txt && echo "PAX entries identical" || echo "PAX entries differ"

          echo ""
          echo "=== Tar verbose diff (first 20 differences) ==="
          diff <(tar -tvf "$DIR/build1/$REF") <(tar -tvf "$DIR/build${DIFF_N}/$DIFF") | head -20
