name: Contempt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: contempt-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - name: Cache updater
        uses: actions/cache@v6
        id: cache
        with:
          path: ~/go/bin/update
          key: updater-${{ runner.os }}-${{ runner.arch }}-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      - name: Clone and build updater
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone -b splitupdating https://github.com/greboid/contempt.git /tmp/contempt
          cd /tmp/contempt
          go build -o ~/go/bin/update ./cmd/update
      - run: ~/go/bin/update -githubpr .
        env:
          GH_TOKEN: ${{ secrets.CONTEMPT_TOKEN }}
          REGISTRY: ${{ secrets.REGISTRY }}
          SOURCE_LINK: https://github.com/greboid/dockerfiles/blob/master/
          TEMPLATE: Containerfile.gotpl
          OUTPUT: Containerfile

  rebase-prs:
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.body == 'rebase' &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - name: Cache updater
        uses: actions/cache@v6
        id: cache
        with:
          path: ~/go/bin/update
          key: updater-${{ runner.os }}-${{ runner.arch }}-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      - name: Clone and build updater
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone -b splitupdating https://github.com/greboid/contempt.git /tmp/contempt
          cd /tmp/contempt
          go build -o ~/go/bin/update ./cmd/update
      - run: ~/go/bin/update -update-prs ${{ github.event_name == 'issue_comment' && format('-pr {0}', github.event.issue.number) || '' }} .
        env:
          GH_TOKEN: ${{ secrets.CONTEMPT_TOKEN }}
          REGISTRY: ${{ secrets.REGISTRY }}
          SOURCE_LINK: https://github.com/greboid/dockerfiles/blob/master/
          TEMPLATE: Containerfile.gotpl
          OUTPUT: Containerfile
