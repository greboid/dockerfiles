  on:
    workflow_call:
      inputs:
        PROJECT_NAME:
          required: true
          type: string
  name: Build Containers
  jobs:
    build:
      name: Build
      runs-on: ubuntu-latest
      steps:
        - name: Checkout source
          uses: actions/checkout@master
        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version: 'stable'
            cache: false
        - name: Get contempt commit SHA
          id: get-sha
          run: echo "sha=$(git ls-remote --heads https://github.com/greboid/contempt.git splitupdating | cut -f1)" >> "$GITHUB_OUTPUT"
        - name: Restore contempt from cache
          uses: actions/cache/restore@v5
          id: cache
          with:
            path: ~/go/bin/contempt
            key: contempt-${{ runner.os }}-${{ runner.arch }}-${{ steps.get-sha.outputs.sha }}
        - name: Clone and build contempt
          if: steps.cache.outputs.cache-hit != 'true'
          run: |
            git clone -b splitupdating https://github.com/greboid/contempt.git /tmp/contempt
            cd /tmp/contempt
            go build -o ~/go/bin/contempt ./cmd/contempt
        - name: Install buildah from source
          run: |
            sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
            git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
            cd /tmp/buildah
            make binary
            sudo make install
            buildah --version
        - name: Login to private registry
          run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"
        - name: Configure Git
          uses: snow-actions/git-config-user@v1.0.0
          with:
            name: ${{ secrets.GIT_USERNAME }}
            email: ${{ secrets.GIT_EMAIL }}
        - name: Update
          env:
            BUILDAH_ISOLATION: chroot
            REGISTRY: ${{ secrets.REGISTRY }}
            SOURCE_LINK: https://github.com/greboid/dockerfiles/blob/master/
          run: contempt -template Containerfile.gotpl -output Containerfile --commit --build --push --project ${{ inputs.PROJECT_NAME }} . .
        - name: Run integration tests
          if: hashFiles(format('{0}/test.sh', inputs.PROJECT_NAME)) != ''
          run: |
            chmod +x ${{ inputs.PROJECT_NAME }}/test.sh
            cd ${{ inputs.PROJECT_NAME }}
            ./test.sh ${{ secrets.REGISTRY }}/${{ inputs.PROJECT_NAME }}
        - name: Check mirror
          uses: andstor/file-existence-action@v3
          id: check_mirror
          with:
            files: "${{ inputs.PROJECT_NAME }}/MIRROR"
        - name: Check if image was built
          if: steps.check_mirror.outputs.files_exists == 'true'
          continue-on-error: true
          id: check_mirror_exists
          run: buildah images ${{ secrets.REGISTRY }}/${{ inputs.PROJECT_NAME }} > /dev/null 2>&1 && echo "status=success" >> "$GITHUB_OUTPUT"; true
        - name: Login to mirror target registry
          if: steps.check_mirror_exists.outputs.status == 'success'
          run: /usr/bin/podman login -u "${{ github.repository_owner }}" -p "${{ secrets.CONTEMPT_TOKEN }}" ghcr.io --verbose
        - name: Retag image to mirror
          if: steps.check_mirror_exists.outputs.status == 'success'
          run: buildah tag ${{ secrets.REGISTRY }}/${{ inputs.PROJECT_NAME }} ghcr.io/${{ github.repository }}/${{ inputs.PROJECT_NAME }}
        - name: Mirror the image
          if: steps.check_mirror_exists.outputs.status == 'success'
          run: buildah push ghcr.io/${{ github.repository }}/${{ inputs.PROJECT_NAME }}
        - name: Push changes
          uses: cutlerydrawer/action-git-try-push@v2.0.1
          with:
            tries: 5
