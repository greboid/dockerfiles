name: Rust Reproducibility Test

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.run }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 5]
    steps:
      - name: Checkout source
        uses: actions/checkout@master

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Get contempt commit SHA
        id: get-sha
        run: echo "sha=$(git ls-remote --heads https://github.com/greboid/contempt.git splitupdating | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore contempt from cache
        uses: actions/cache/restore@v5
        id: cache
        with:
          path: ~/go/bin/contempt
          key: contempt-${{ runner.os }}-${{ runner.arch }}-${{ steps.get-sha.outputs.sha }}

      - name: Clone and build contempt
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone -b splitupdating https://github.com/greboid/contempt.git /tmp/contempt
          cd /tmp/contempt
          go build -o ~/go/bin/contempt ./cmd/contempt

      - name: Install buildah from source
        run: |
          sudo apt-get install -y libgpgme-dev libseccomp-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone --depth 1 --branch v1.43.1 https://github.com/containers/buildah.git /tmp/buildah
          cd /tmp/buildah
          make bin/buildah
          sudo install -m 755 bin/buildah /usr/bin/buildah
          buildah --version

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | podman login -u "${{ secrets.REGISTRY_USER }}" --password-stdin "${{ secrets.REGISTRY }}"

      - name: Build rust image
        env:
          BUILDAH_ISOLATION: chroot
          REGISTRY: ${{ secrets.REGISTRY }}
          SOURCE_LINK: https://github.com/greboid/dockerfiles/blob/master/
        run: |
          ~/go/bin/contempt \
            -template Containerfile.gotpl \
            -output Containerfile \
            -force-build=1 \
            -project rust \
            . .

      - name: Export image
        run: |
          mkdir -p /tmp/rust-export
          buildah push ${{ secrets.REGISTRY }}/rust dir:/tmp/rust-export

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-${{ matrix.run }}
          path: /tmp/rust-export/
          retention-days: 1

  compare:
    name: Compare builds
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/builds
          pattern: rust-build-*

      - name: Compare layer digests across runners
        run: |
          set +e
          echo "=== Layer digests ==="
          REF_LAYER=""
          REF_N=""
          DIFF_N=""

          for dir in /tmp/builds/rust-build-*/; do
            name=$(basename "$dir")
            layer=$(python3 -c "import json; print(json.load(open('$dir/manifest.json'))['layers'][0]['digest'])")
            config=$(python3 -c "import json; print(json.load(open('$dir/manifest.json'))['config']['digest'])")
            echo "$name: layer=$layer config=$config"

            if [ -z "$REF_LAYER" ]; then
              REF_LAYER=$layer
              REF_N=$name
            elif [ "$layer" != "$REF_LAYER" ]; then
              DIFF_N=$name
            fi
          done

          if [ -z "$DIFF_N" ]; then
            echo ""
            echo "=== All builds produced identical layers ==="
            exit 0
          fi

          echo ""
          echo "!!! DIFFERENCE: $REF_N vs $DIFF_N !!!"

          REF_FILE=$(ls /tmp/builds/$REF_N/*.tar 2>/dev/null || ls /tmp/builds/$REF_N/$(python3 -c "import json; print(json.load(open('/tmp/builds/$REF_N/manifest.json'))['layers'][0]['digest'].split(':')[1])") 2>/dev/null)
          DIFF_FILE=$(ls /tmp/builds/$DIFF_N/*.tar 2>/dev/null || ls /tmp/builds/$DIFF_N/$(python3 -c "import json; print(json.load(open('/tmp/builds/$DIFF_N/manifest.json'))['layers'][0]['digest'].split(':')[1])") 2>/dev/null)

          # Fallback: find layer by digest
          if [ ! -f "$REF_FILE" ]; then
            REF_DIGEST=$(python3 -c "import json; print(json.load(open('/tmp/builds/$REF_N/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            REF_FILE="/tmp/builds/$REF_N/$REF_DIGEST"
          fi
          if [ ! -f "$DIFF_FILE" ]; then
            DIFF_DIGEST=$(python3 -c "import json; print(json.load(open('/tmp/builds/$DIFF_N/manifest.json'))['layers'][0]['digest'].split(':')[1])")
            DIFF_FILE="/tmp/builds/$DIFF_N/$DIFF_DIGEST"
          fi

          echo "Ref file: $REF_FILE"
          echo "Diff file: $DIFF_FILE"

          mkdir -p /tmp/lref /tmp/ldiff
          echo "Extracting ref layer..."
          tar -C /tmp/lref -xf "$REF_FILE" 2>&1 || true
          echo "Extracting diff layer..."
          tar -C /tmp/ldiff -xf "$DIFF_FILE" 2>&1 || true

          echo ""
          echo "=== File content differences ==="
          diff <(cd /tmp/lref && find . -type f -exec sha256sum {} \; | sort) <(cd /tmp/ldiff && find . -type f -exec sha256sum {} \; | sort) > /tmp/content-diff.txt 2>&1 || true
          DIFF_FILES=$(comm -12 <(grep "^<" /tmp/content-diff.txt | awk '{print $NF}' | sort -u) <(grep "^>" /tmp/content-diff.txt | awk '{print $NF}' | sort -u))
          DIFF_COUNT=$(echo "$DIFF_FILES" | grep -c . || true)
          echo "$DIFF_COUNT differing files:"
          echo "$DIFF_FILES"

          echo ""
          echo "=== Files only in ref ==="
          diff <(cd /tmp/lref && find . | sort) <(cd /tmp/ldiff && find . | sort) | grep "^<" || echo "none"
          echo "=== Files only in diff ==="
          diff <(cd /tmp/lref && find . | sort) <(cd /tmp/ldiff && find . | sort) | grep "^>" || echo "none"

          echo ""
          echo "=== Directory differences ==="
          diff <(cd /tmp/lref && find . -type d | sort) <(cd /tmp/ldiff && find . -type d | sort) || true

          echo ""
          echo "=== Symlink differences ==="
          diff <(cd /tmp/lref && find . -type l | sort) <(cd /tmp/ldiff && find . -type l | sort) || true

          for f in $DIFF_FILES; do
            echo ""
            echo "--- $f ---"
            SIZE1=$(stat -c%s "/tmp/lref$f" 2>/dev/null || echo N/A)
            SIZE2=$(stat -c%s "/tmp/ldiff$f" 2>/dev/null || echo N/A)
            echo "Size: $SIZE1 vs $SIZE2"
            TYPE1=$(file "/tmp/lref$f" 2>/dev/null || echo N/A)
            echo "Type: $TYPE1"
            if command -v readelf > /dev/null 2>&1; then
              echo "Build ID ref: $(readelf -n "/tmp/lref$f" 2>/dev/null | grep "Build ID" | head -1)"
              echo "Build ID diff: $(readelf -n "/tmp/ldiff$f" 2>/dev/null | grep "Build ID" | head -1)"
            fi
            BYTE_DIFF=$(cmp -l "/tmp/lref$f" "/tmp/ldiff$f" 2>/dev/null | wc -l)
            FIRST_DIFF=$(cmp -l "/tmp/lref$f" "/tmp/ldiff$f" 2>/dev/null | head -1 | awk '{print $1}')
            echo "Byte differences: $BYTE_DIFF  First diff at: $FIRST_DIFF"
            if command -v xxd > /dev/null 2>&1 && [ -n "$FIRST_DIFF" ]; then
              echo "Context (ref):"
              dd if="/tmp/lref$f" bs=1 skip=$((FIRST_DIFF - 16)) count=64 2>/dev/null | xxd | head -6
              echo "Context (diff):"
              dd if="/tmp/ldiff$f" bs=1 skip=$((FIRST_DIFF - 16)) count=64 2>/dev/null | xxd | head -6
            fi
            if command -v strings > /dev/null 2>&1; then
              echo "Strings near diff (ref):"
              strings -t d "/tmp/lref$f" | awk -v pos="$FIRST_DIFF" '$1 > pos-64 && $1 < pos+64' | head -5
              echo "Strings near diff (diff):"
              strings -t d "/tmp/ldiff$f" | awk -v pos="$FIRST_DIFF" '$1 > pos-64 && $1 < pos+64' | head -5
            fi
          done

          echo ""
          echo "=== Raw tar comparison ==="
          TAR_DIFF=$(cmp -l "$REF_FILE" "$DIFF_FILE" 2>/dev/null | wc -l)
          echo "Tar byte differences: $TAR_DIFF"

          exit 1
